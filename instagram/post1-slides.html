<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTEIO — Post 1 · Carrossel</title>
    <link href="https://fonts.googleapis.com/css2?family=Encode+Sans+Condensed:wght@300;400;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --marrom: #8A3E05;
            --antracite: #1A1A1A;
            --preto: #000000;
            --branco: #FFFFFF;
            --creme: #FAF8F5;
        }

        body {
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Barlow', sans-serif;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header-label {
            font-family: 'Encode Sans Condensed', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--marrom);
            margin-bottom: 8px;
        }

        .header-title {
            font-family: 'Encode Sans Condensed', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.9);
        }

        /* SLIDE CONTAINER */
        .slide-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        /* SLIDE — formato 4:5 Instagram */
        .slide {
            width: 100%;
            aspect-ratio: 4 / 5;
            display: none;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .slide.active {
            display: block;
            opacity: 1;
        }

        .slide img.slide-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .slide-07 .brand-divider {
            width: 40px;
            height: 2px;
            background: var(--marrom);
            margin: 0 auto 20px;
        }

        .slide-07 .brand-tagline {
            font-family: 'Barlow', sans-serif;
            font-size: clamp(12px, 3vw, 15px);
            font-weight: 300;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.85);
        }

        /* Dots de navegação */
        .slide-counter-dot {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: background 0.3s;
        }

        .dot.active {
            background: var(--marrom);
        }

        /* CONTROLES */
        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 24px;
        }

        .btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            font-family: 'Encode Sans Condensed', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 10px 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: var(--marrom);
            color: var(--branco);
        }

        .btn:disabled {
            opacity: 0.2;
            cursor: default;
        }

        .slide-counter-text {
            font-family: 'Encode Sans Condensed', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.3);
            min-width: 50px;
            text-align: center;
        }

        /* LEGENDA */
        .legenda {
            margin-top: 28px;
            max-width: 400px;
            width: 100%;
            background: rgba(255,255,255,0.04);
            border-left: 2px solid var(--marrom);
            padding: 16px 20px;
        }

        .legenda-label {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--marrom);
            margin-bottom: 10px;
        }

        .legenda-text {
            font-size: 13px;
            font-weight: 300;
            color: rgba(255,255,255,0.7);
            line-height: 1.8;
        }

        .legenda-hashtags {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            margin-top: 8px;
            font-style: italic;
        }

        /* KEYBOARD HINT */
        .keyboard-hint {
            margin-top: 16px;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-label">Semana 1 · Terça-feira</div>
    <div class="header-title">Post 01 — Manifesto</div>
</div>

<div class="slide-wrapper">

    <!-- Slide 01 — Hook -->
    <div class="slide slide-01 active">
        <img src="post1/slide-1.jpg" alt="Slide 1" class="slide-img">
    </div>

    <!-- Slide 02 — Vilão -->
    <div class="slide slide-02">
        <img src="post1/slide-2.jpg" alt="Slide 2" class="slide-img">
    </div>

    <!-- Slide 03 — Herói -->
    <div class="slide slide-03">
        <img src="post1/slide-3.jpg" alt="Slide 3" class="slide-img">
    </div>

    <!-- Slide 04 — Ações -->
    <div class="slide slide-04">
        <img src="post1/slide-4.jpg" alt="Slide 4" class="slide-img">
    </div>

    <!-- Slide 05 — Crise -->
    <div class="slide slide-05">
        <img src="post1/slide-5.jpg" alt="Slide 5" class="slide-img">
    </div>

    <!-- Slide 06 — Climax -->
    <div class="slide slide-06">
        <img src="post1/slide-6.jpg" alt="Slide 6" class="slide-img">
    </div>

    <!-- Slide 07 — Resolução -->
    <div class="slide slide-07">
        <img src="post1/slide-7.jpg" alt="Slide 7" class="slide-img">
    </div>

</div>

<!-- CONTROLES -->
<div class="controls">
    <button class="btn" id="btnPrev" onclick="changeSlide(-1)" disabled>← Anterior</button>
    <span class="slide-counter-text" id="counter">1 / 7</span>
    <button class="btn" id="btnNext" onclick="changeSlide(1)">Próximo →</button>
</div>

<!-- LEGENDA -->
<div class="legenda">
    <div class="legenda-label">Legenda do post</div>
    <div class="legenda-text">
        Se você leu isso e pensou em alguém — manda pra essa pessoa.<br>
        Vista sua raiz.
    </div>
    <div class="legenda-hashtags">#modamasculina #homembrasileiro #raiz #modamasculinabrasileira</div>
</div>

<div class="keyboard-hint">← → para navegar entre slides</div>

<script>
    let current = 0;
    const slides = document.querySelectorAll('.slide');
    const total = slides.length;

    function changeSlide(dir) {
        slides[current].classList.remove('active');
        current = Math.max(0, Math.min(total - 1, current + dir));
        // força reflow para a transição de fade funcionar
        void slides[current].offsetWidth;
        slides[current].classList.add('active');
        document.getElementById('counter').textContent = (current + 1) + ' / 7';
        document.getElementById('btnPrev').disabled = current === 0;
        document.getElementById('btnNext').disabled = current === total - 1;
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight') changeSlide(1);
        if (e.key === 'ArrowLeft') changeSlide(-1);
    });
</script>

</body>
</html>
